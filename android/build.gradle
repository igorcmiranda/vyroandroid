// 1. Buildscript must appear before plugins {} when mixing both styles
buildscript {
    repositories {
        google()
        mavenCentral()
        maven { url = uri("$rootDir/../node_modules/expo/android/maven") }
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.5.0")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24")
        classpath('com.google.gms:google-services:4.4.0')
    }
}

// 2. Plugins block (kept, but buildscript is declared before it)
plugins {
    id("com.android.application") version "8.5.0" apply false
    id("com.facebook.react") version "0.83.0" apply false
    id("org.jetbrains.kotlin.android") version "1.9.24" apply false
}

// 3. Ext block
ext {
    buildToolsVersion = "35.0.0"
    minSdkVersion = 24
    compileSdkVersion = 35
    compileSdk = 35
    targetSdkVersion = 35
    ndkVersion = "27.1.12297006"
    kotlinVersion = "1.9.24"
}

// 4. Repositórios
allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url = uri("$rootDir/../node_modules/expo/android/maven") }
    }
}

// 5. Apply root plugins
apply plugin: "com.facebook.react.rootproject"
apply plugin: 'com.google.gms.google-services'